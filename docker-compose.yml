services:
  postgres:
    image: postgres:17-alpine
    container_name: pro_core_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pro_core}
      POSTGRES_USER: ${POSTGRES_USER:-pro_core}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pro_core_dev_password}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - pro_core_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pro_core} -d ${POSTGRES_DB:-pro_core}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pro_core_postgres_data:
